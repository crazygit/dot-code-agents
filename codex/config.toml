# Versioned Codex baseline config.
# This file contains configuration that can be shared across machines.
# Local project trust levels are managed separately by Codex.

personality = "pragmatic"
web_search = "live"
model = "gpt-5.4"
model_reasoning_effort = "medium"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
notify = ["bash", "./scripts/notify-macos.sh"]

[sandbox_workspace_write]
network_access = true

[tui]
notifications = true
notification_method = "auto"

[notice.model_migrations]
"gpt-5.3-codex" = "gpt-5.4"

# 插件配置
[plugins."github@openai-curated"]
enabled = true

[plugins."issue-flow@codex-local-plugins"]
enabled = true
